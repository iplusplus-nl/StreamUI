<sessiontitle>Split Calculator</sessiontitle>
<chat></chat>
<streamui>
<style>
  .calc-container {
    --bg-surface: var(--streamui-page-bg, #212121);
    --bg-card: rgba(255, 255, 255, 0.05);
    --border-color: rgba(255, 255, 255, 0.1);
    --text-primary: var(--streamui-text, #f0f0f0);
    --text-muted: var(--streamui-muted, #a0a0a0);
    --accent: currentColor;
    --accent-bg: rgba(255, 255, 255, 0.15);
    --highlight: #2ed573;

    max-width: 420px;
    margin: 2rem auto;
    background: var(--bg-surface);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    padding: 1.5rem;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    font-family: system-ui, -apple-system, sans-serif;
    color: var(--text-primary);
    box-sizing: border-box;
  }

  .calc-container * {
    box-sizing: inherit;
  }

  .calc-header {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .calc-header h2 {
    margin: 0;
    font-size: 1.25rem;
    font-weight: 600;
  }
</style>

<div class="calc-container">
  <div class="calc-header">
    <h2>Split & Tip</h2>
  </div>

<style>
  .input-section {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .input-group label {
    font-size: 0.875rem;
    color: var(--text-muted);
    font-weight: 500;
    display: flex;
    justify-content: space-between;
  }

  .bill-input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 0 1rem;
    transition: border-color 0.2s;
  }

  .bill-input-wrapper:focus-within {
    border-color: var(--highlight);
  }

  .bill-input-wrapper .currency {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--text-muted);
  }

  .bill-input-wrapper input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text-primary);
    font-size: 1.5rem;
    font-weight: 600;
    padding: 0.75rem 0.5rem;
    outline: none;
    text-align: right;
  }

  /* Remove number arrows */
  .bill-input-wrapper input::-webkit-outer-spin-button,
  .bill-input-wrapper input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .bill-input-wrapper input[type=number] {
    -moz-appearance: textfield;
  }
</style>

  <div class="input-section">
    <div class="input-group">
      <label>Bill Amount</label>
      <div class="bill-input-wrapper">
        <span class="currency">€</span>
        <input type="number" id="calc-bill" value="186.50" step="0.01" min="0">
      </div>
    </div>

<style>
  .tip-controls {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .tip-slider-wrapper {
    display: flex;
    align-items: center;
  }

  .tip-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    background: var(--bg-card);
    border-radius: 4px;
    outline: none;
  }

  .tip-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--highlight);
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }

  .tip-chips {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.5rem;
  }

  .tip-chip {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    padding: 0.5rem;
    border-radius: 8px;
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .tip-chip:hover {
    background: var(--accent-bg);
  }

  .tip-chip.active {
    background: var(--highlight);
    border-color: var(--highlight);
    color: #111;
  }
</style>

    <div class="input-group tip-controls">
      <label>
        <span>Tip Percentage</span>
        <span id="tip-display-val">15%</span>
      </label>
      <div class="tip-slider-wrapper">
        <input type="range" class="tip-slider" id="calc-tip-slider" min="0" max="40" value="15" step="1">
      </div>
      <div class="tip-chips">
        <button class="tip-chip" data-tip="10">10%</button>
        <button class="tip-chip active" data-tip="15">15%</button>
        <button class="tip-chip" data-tip="18">18%</button>
        <button class="tip-chip" data-tip="20">20%</button>
      </div>
    </div>

<style>
  .party-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 0.25rem;
  }

  .party-btn {
    background: transparent;
    border: none;
    color: var(--text-primary);
    font-size: 1.5rem;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.2s;
  }

  .party-btn:hover {
    background: var(--accent-bg);
  }

  .party-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .party-value {
    font-size: 1.25rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .party-icon {
    width: 18px;
    height: 18px;
    fill: currentColor;
    opacity: 0.7;
  }
</style>

    <div class="input-group">
      <label>Party Size</label>
      <div class="party-controls">
        <button class="party-btn" id="calc-party-minus">−</button>
        <div class="party-value">
          <svg class="party-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          <span id="calc-party-val">4</span>
        </div>
        <button class="party-btn" id="calc-party-plus">+</button>
      </div>
    </div>
  </div>

<style>
  .calc-divider {
    height: 1px;
    background: var(--border-color);
    margin: 1.5rem 0;
    border-style: dashed;
    border-width: 1px;
    border-bottom: none;
    background: transparent;
    border-color: rgba(255,255,255,0.2);
  }

  .output-section {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .summary-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.9375rem;
    color: var(--text-muted);
  }

  .summary-row .val {
    color: var(--text-primary);
    font-family: tabular-nums, sans-serif;
  }

  .summary-row.total-row {
    margin-top: 0.5rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border-color);
    font-size: 1.125rem;
    font-weight: 600;
    color: var(--text-primary);
  }

  .result-banner {
    margin-top: 1.5rem;
    background: rgba(46, 213, 115, 0.1);
    border: 1px solid rgba(46, 213, 115, 0.2);
    border-radius: 16px;
    padding: 1.25rem;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .result-label {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--highlight);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .result-val {
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--highlight);
    line-height: 1;
    font-family: tabular-nums, sans-serif;
  }
</style>

  <div class="calc-divider"></div>

  <div class="output-section">
    <div class="summary-row">
      <span>Subtotal</span>
      <span class="val" id="out-subtotal">€186.50</span>
    </div>
    <div class="summary-row">
      <span>Tip Amount <span id="out-tip-pct">(15%)</span></span>
      <span class="val" id="out-tip-amt">€0.00</span>
    </div>
    <div class="summary-row total-row">
      <span>Total Bill</span>
      <span class="val" id="out-total">€0.00</span>
    </div>
  </div>

  <div class="result-banner">
    <div class="result-label">Per Person</div>
    <div class="result-val" id="out-per-person">€0.00</div>
  </div>

  <div class="streamui-actions" style="justify-content: center; margin-top: 1.5rem;">
      <button class="streamui-button secondary" data-streamui-prompt="Add a feature to itemize the bill for uneven splitting.">Uneven split</button>
  </div>
</div>

<script>
  (function() {
    const elBill = document.getElementById('calc-bill');
    const elTipSlider = document.getElementById('calc-tip-slider');
    const elTipDisplayVal = document.getElementById('tip-display-val');
    const tipChips = document.querySelectorAll('.tip-chip');

    const btnMinus = document.getElementById('calc-party-minus');
    const btnPlus = document.getElementById('calc-party-plus');
    const elPartyVal = document.getElementById('calc-party-val');

    const outSubtotal = document.getElementById('out-subtotal');
    const outTipPct = document.getElementById('out-tip-pct');
    const outTipAmt = document.getElementById('out-tip-amt');
    const outTotal = document.getElementById('out-total');
    const outPerPerson = document.getElementById('out-per-person');

    let state = {
      bill: 186.50,
      tipPct: 15,
      partySize: 4
    };

    function formatCurrency(val) {
      return '€' + (val || 0).toFixed(2);
    }

    function calculate() {
      const tipAmount = state.bill * (state.tipPct / 100);
      const totalBill = state.bill + tipAmount;
      const perPerson = totalBill / state.partySize;

      outSubtotal.textContent = formatCurrency(state.bill);
      outTipPct.textContent = `(${state.tipPct}%)`;
      outTipAmt.textContent = formatCurrency(tipAmount);
      outTotal.textContent = formatCurrency(totalBill);
      outPerPerson.textContent = formatCurrency(perPerson);

      elTipDisplayVal.textContent = `${state.tipPct}%`;
      elPartyVal.textContent = state.partySize;

      btnMinus.disabled = state.partySize <= 1;

      tipChips.forEach(chip => {
        const val = parseInt(chip.getAttribute('data-tip'), 10);
        if (val === state.tipPct) {
          chip.classList.add('active');
        } else {
          chip.classList.remove('active');
        }
      });
    }

    elBill.addEventListener('input', (e) => {
      let val = parseFloat(e.target.value);
      if (isNaN(val)) val = 0;
      state.bill = val;
      calculate();
    });

    elTipSlider.addEventListener('input', (e) => {
      state.tipPct = parseInt(e.target.value, 10);
      calculate();
    });

    tipChips.forEach(chip => {
      chip.addEventListener('click', () => {
        const val = parseInt(chip.getAttribute('data-tip'), 10);
        state.tipPct = val;
        elTipSlider.value = val;
        calculate();
      });
    });

    btnMinus.addEventListener('click', () => {
      if (state.partySize > 1) {
        state.partySize -= 1;
        calculate();
      }
    });

    btnPlus.addEventListener('click', () => {
      state.partySize += 1;
      calculate();
    });

    // Initial calc
    calculate();
  })();
</script>
</streamui>
